apiVersion: apps/v1

kind: Deployment

metadata:
  name: hello-world-java

spec:
  replicas: 1

  selector:
    matchLabels:
      app: hello-world-java

  template:
    metadata:
      labels:
        app: hello-world-java

    spec:
      containers:
      - name: hello-world-java
        image: asia-south1-docker.pkg.dev/hello-world-java-502611/hello-world-java/hello-world-java:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080